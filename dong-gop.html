<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Đóng góp từ vựng</title>
  <link rel="stylesheet" href="css/dong-gop.css" />
</head>

<body>
  <div class="container">
    <h1>Đóng góp từ vựng</h1>

    <label for="input-tu">
      Nhập từ muốn đóng góp (2 âm tiết):
    </label>

    <input
      type="text"
      id="input-tu"
      placeholder="Ví dụ: Phòng chờ..."
      autocomplete="off"
    />

    <button id="btn-dong-gop">
      Đóng góp
    </button>

    <p id="thong-bao"></p>
  </div>

  <!-- MVC ENTRY POINT -->
  <script type="module" src="Views/DongGopView.js"></script>
</body>
</html>
